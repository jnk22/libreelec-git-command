---
name: ci

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - ci_add-github-actions
  pull_request:
  workflow_dispatch:

env:
  SHELLSPEC_VERSION: 0.28.1
  KCOV_VERSION: v43

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@4c82c3ccdc1344ee11e9775dbdbdf43aa8a5614e # v1.5.1
        with:
          packages: binutils-dev build-essential cmake libssl-dev libcurl4-openssl-dev libelf-dev libstdc++-12-dev zlib1g-dev libdw-dev libiberty-dev
          version: 1.0

      # - name: Install dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y binutils-dev build-essential cmake libssl-dev libcurl4-openssl-dev libelf-dev libstdc++-12-dev zlib1g-dev libdw-dev libiberty-dev

      - name: Cache kcov build
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        id: kcov-cache
        with:
          path: |
            kcov/build
          key: ${{ runner.os }}-kcov-build-${{ hashFiles('kcov/**') }}

      - name: Build kcov
        if: steps.kcov-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$KCOV_VERSION" https://github.com/SimonKagstrom/kcov.git
          cd kcov
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Install kcov
        run: |
          cd kcov/build
          sudo make install

      - name: Install ShellSpec
        run: |
          curl -fsSL "https://raw.githubusercontent.com/shellspec/shellspec/$SHELLSPEC_VERSION/install.sh" | sh -s "$SHELLSPEC_VERSION" --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run ShellSpec tests
        env:
          # Must be set to 'false' to prevent ShellSpec errors.
          DOCKER_INTERACTIVE: false
          DOCKER_TTY: false
        run: shellspec --shell bash --kcov --kcov-options "--include-pattern=git"
        # run: shellspec --shell bash

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
