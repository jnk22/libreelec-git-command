---
name: ci

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - ci_add-github-actions
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: awalsh128/cache-apt-pkgs-action@4c82c3ccdc1344ee11e9775dbdbdf43aa8a5614e # v1.5.1
        with:
          packages: binutils-dev build-essential cmake libssl-dev libcurl4-openssl-dev libelf-dev libstdc++-12-dev zlib1g-dev libdw-dev libiberty-dev
          version: 1.0

      # - name: Install dependencies
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y binutils-dev build-essential cmake libssl-dev libcurl4-openssl-dev libelf-dev libstdc++-12-dev zlib1g-dev libdw-dev libiberty-dev

      # - name: Cache Homebrew
      #   uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      #   id: cache-homebrew
      #   with:
      #     path: |
      #       /home/linuxbrew/.linuxbrew
      #       ~/.cache/Homebrew
      #     key: ${{ runner.os }}-homebrew-${{ hashFiles('**/Brewfile') }}
      #     restore-keys: |
      #       ${{ runner.os }}-homebrew-

      - name: Install Homebrew
        # if: steps.cache-homebrew.outputs.cache-hit != 'true'
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> "$GITHUB_ENV"
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

      # - name: Setup Homebrew environment
      #   if: steps.cache-homebrew.outputs.cache-hit == 'true'
      #   run: |
      #     echo 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"' >> "$GITHUB_ENV"
      #     eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

      - name: Install shellspec and kcov using brew
        run: brew install shellspec kcov

      - name: Run ShellSpec tests
        env:
          # Must be set to 'false' to prevent ShellSpec errors.
          DOCKER_INTERACTIVE: false
          DOCKER_TTY: false
        run: shellspec --shell bash --kcov --kcov-options "--include-pattern=/git"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
